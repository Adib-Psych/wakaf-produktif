name: Update ENSO State (Weekly)

# Mengambil NOAA Oceanic Niño Index (ONI) data mingguan,
# parse ke phase (el-nino/la-nina/neutral), commit ke data/enso-state.json.
# Memungkinkan monitor-v2.html fetch dari same-origin (tanpa CORS error).

on:
  schedule:
    # Setiap Senin 06:00 UTC (≈ 13:00 WIB)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Manual trigger via Actions tab

permissions:
  contents: write

jobs:
  update-enso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch NOAA ONI data
        run: |
          curl -s -f -o /tmp/oni.data \
            "https://psl.noaa.gov/data/correlation/oni.data" || {
              echo "::warning::NOAA fetch failed — keeping existing enso-state.json"
              exit 0
            }
          echo "Fetched $(wc -l < /tmp/oni.data) lines from NOAA"

      - name: Parse ONI → ENSO phase
        run: |
          python3 << 'EOF'
          import json, os, re
          from datetime import datetime, timezone

          if not os.path.exists('/tmp/oni.data'):
              print('No oni.data file — skipping')
              exit(0)

          with open('/tmp/oni.data') as f:
              raw = f.read()

          # ONI file format: each line = "YEAR  JAN  FEB  MAR  APR  MAY  JUN  JUL  AUG  SEP  OCT  NOV  DEC"
          # Missing months shown as -99.90
          rows = []
          for line in raw.split('\n'):
              line = line.strip()
              parts = line.split()
              if len(parts) == 13 and parts[0].isdigit():
                  year = int(parts[0])
                  for m_idx, val in enumerate(parts[1:], 1):
                      try:
                          v = float(val)
                          if v > -99:  # filter sentinel
                              rows.append((year, m_idx, v))
                      except ValueError:
                          continue

          if not rows:
              print('No valid ONI rows parsed')
              exit(0)

          # Last 3 months for phase determination (NOAA convention: ENSO declared
          # when 3 consecutive months exceed ±0.5°C threshold)
          last_3 = rows[-3:]
          avg_oni = sum(v for _, _, v in last_3) / len(last_3)

          if avg_oni >= 0.5:
              phase = 'el-nino'
          elif avg_oni <= -0.5:
              phase = 'la-nina'
          else:
              phase = 'neutral'

          # Intensity classification
          abs_oni = abs(avg_oni)
          if abs_oni < 0.5:
              intensity = 'neutral'
          elif abs_oni < 1.0:
              intensity = 'weak'
          elif abs_oni < 1.5:
              intensity = 'moderate'
          elif abs_oni < 2.0:
              intensity = 'strong'
          else:
              intensity = 'very-strong'

          # Build output
          out = {
              'phase': phase,
              'oni_avg_3m': round(avg_oni, 2),
              'intensity': intensity,
              'last_month_year': last_3[-1][0],
              'last_month_idx': last_3[-1][1],
              'source': 'https://psl.noaa.gov/data/correlation/oni.data',
              'fetched_at': datetime.now(timezone.utc).isoformat(),
              'expires_at': None,  # client-side: re-fetch on next page load if file is stale
              'note': 'Auto-generated by .github/workflows/update-enso.yml (weekly cron)'
          }

          with open('data/enso-state.json', 'w') as f:
              json.dump(out, f, indent=2, ensure_ascii=False)

          print(f"ENSO state updated: phase={phase}, oni_avg_3m={out['oni_avg_3m']}, intensity={intensity}")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/enso-state.json 2>/dev/null; then
            echo "No change in enso-state.json — skipping commit"
          else
            git add data/enso-state.json
            git commit -m "chore(enso): weekly auto-update ENSO state from NOAA ONI"
            git push
            echo "ENSO state committed and pushed"
          fi
